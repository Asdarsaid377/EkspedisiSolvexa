<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FAF7F2; /* Base Layer from Style Guidance */
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for better mobile feel */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        .soft-shadow {
            box-shadow: 0px 4px 12px rgba(31, 41, 55, 0.04);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#341100",
                        "primary-fixed": "#ffdbca",
                        "on-secondary-container": "#656461",
                        "inverse-on-surface": "#eaf1ff",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#a4988f",
                        "surface": "#f8f9ff",
                        "on-background": "#121c2a",
                        "secondary-fixed": "#e5e2dd",
                        "on-surface-variant": "#584237",
                        "background": "#f8f9ff",
                        "on-secondary-fixed-variant": "#474743",
                        "on-tertiary-fixed": "#211a14",
                        "on-primary-fixed-variant": "#783200",
                        "inverse-surface": "#27313f",
                        "on-tertiary-container": "#38312a",
                        "error-container": "#ffdad6",
                        "outline": "#8c7164",
                        "secondary-container": "#e5e2dd",
                        "tertiary": "#665d54",
                        "surface-tint": "#9d4300",
                        "inverse-primary": "#ffb690",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#5f5e5b",
                        "surface-container": "#e6eeff",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#e0c0b1",
                        "on-surface": "#121c2a",
                        "primary-fixed-dim": "#ffb690",
                        "surface-container-high": "#dee9fc",
                        "secondary-fixed-dim": "#c8c6c2",
                        "on-secondary-fixed": "#1c1c19",
                        "tertiary-fixed": "#eee0d5",
                        "surface-dim": "#d0dbed",
                        "surface-bright": "#f8f9ff",
                        "surface-container-low": "#eff4ff",
                        "on-primary-container": "#582200",
                        "surface-container-highest": "#d9e3f6",
                        "on-error": "#ffffff",
                        "surface-variant": "#d9e3f6",
                        "primary": "#9d4300",
                        "on-tertiary-fixed-variant": "#4e453e",
                        "primary-container": "#f97316",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#d1c4ba"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-margin": "24px",
                        "container-padding": "20px",
                        "inline-gap": "12px",
                        "stack-gap": "16px",
                        "grid-mobile": "390px"
                    },
                    "fontFamily": {
                        "body-md": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "caption": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline": ["Plus Jakarta Sans"],
                        "number-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["15px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "display": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "headline": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "number-md": ["16px", {"lineHeight": "24px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface-dim border-b border-outline-variant/30 flex justify-between items-center px-container-padding h-16">
<div class="flex items-center gap-3">
<button class="active:scale-95 transition-transform text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-display text-display text-primary dark:text-primary-fixed">Kirim Paket</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant">help_outline</span>
</div>
</header>
<main class="pt-20 pb-32 px-container-padding max-w-[grid-mobile] mx-auto">
<!-- Stepper Component (Visual Guide) -->
<div class="flex items-center justify-between mb-8 px-2">
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary-container text-white flex items-center justify-center font-bold text-sm">1</div>
<span class="text-caption font-label-md text-primary">Detail</span>
</div>
<div class="h-[2px] flex-1 bg-outline-variant mx-2 -mt-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-secondary-container text-on-surface-variant flex items-center justify-center font-bold text-sm">2</div>
<span class="text-caption font-label-md text-on-surface-variant">Layanan</span>
</div>
<div class="h-[2px] flex-1 bg-outline-variant mx-2 -mt-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-secondary-container text-on-surface-variant flex items-center justify-center font-bold text-sm">3</div>
<span class="text-caption font-label-md text-on-surface-variant">Bayar</span>
</div>
</div>
<form class="space-y-6" id="shipmentForm">
<!-- Section 1: Informasi Pengirim -->
<section class="bg-surface-container-lowest rounded-xl p-5 soft-shadow">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">outbound</span>
<h2 class="font-headline text-headline text-on-surface">Informasi Pengirim</h2>
</div>
<div class="space-y-4">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5">Nama Pengirim</label>
<input class="w-full bg-[#FAF7F2] border-none rounded-[12px] px-4 py-3 text-body-md focus:ring-1.5 focus:ring-primary-container focus:bg-[#FAF7F2] transition-all" placeholder="Masukkan nama lengkap" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5">Nomor Telepon</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-body-md text-on-surface-variant font-medium">+62</span>
<input class="w-full bg-[#FAF7F2] border-none rounded-[12px] pl-14 pr-4 py-3 text-body-md focus:ring-1.5 focus:ring-primary-container focus:bg-[#FAF7F2] transition-all" placeholder="812 3456 7890" type="tel"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5">Alamat Lengkap</label>
<textarea class="w-full bg-[#FAF7F2] border-none rounded-[12px] px-4 py-3 text-body-md focus:ring-1.5 focus:ring-primary-container focus:bg-[#FAF7F2] transition-all" placeholder="Nama jalan, nomor rumah, RT/RW, Kecamatan" rows="3"></textarea>
</div>
</div>
</section>
<!-- Section 2: Informasi Penerima -->
<section class="bg-surface-container-lowest rounded-xl p-5 soft-shadow">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">where_to_vote</span>
<h2 class="font-headline text-headline text-on-surface">Informasi Penerima</h2>
</div>
<button class="text-primary font-label-md text-label-md flex items-center gap-1 active:scale-95 transition-transform" type="button">
<span class="material-symbols-outlined text-[18px]">contacts</span>
                        Kontak
                    </button>
</div>
<div class="space-y-4">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5">Nama Penerima</label>
<input class="w-full bg-[#FAF7F2] border-none rounded-[12px] px-4 py-3 text-body-md focus:ring-1.5 focus:ring-primary-container focus:bg-[#FAF7F2] transition-all" placeholder="Masukkan nama penerima" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5">Nomor Telepon</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-body-md text-on-surface-variant font-medium">+62</span>
<input class="w-full bg-[#FAF7F2] border-none rounded-[12px] pl-14 pr-4 py-3 text-body-md focus:ring-1.5 focus:ring-primary-container focus:bg-[#FAF7F2] transition-all" placeholder="812 3456 7890" type="tel"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5">Alamat Lengkap</label>
<textarea class="w-full bg-[#FAF7F2] border-none rounded-[12px] px-4 py-3 text-body-md focus:ring-1.5 focus:ring-primary-container focus:bg-[#FAF7F2] transition-all" placeholder="Nama jalan, nomor rumah, RT/RW, Kecamatan" rows="3"></textarea>
</div>
</div>
</section>
<!-- Section 3: Detail Paket -->
<section class="bg-surface-container-lowest rounded-xl p-5 soft-shadow">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
<h2 class="font-headline text-headline text-on-surface">Detail Paket</h2>
</div>
<div class="space-y-5">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-3">Kategori Paket</label>
<div class="grid grid-cols-2 gap-3">
<label class="relative block cursor-pointer">
<input checked="" class="peer sr-only" name="category" type="radio" value="dokumen"/>
<div class="p-4 rounded-[12px] border-2 border-transparent bg-[#FAF7F2] text-center peer-checked:border-primary-container peer-checked:bg-primary-fixed/30 transition-all">
<span class="material-symbols-outlined block mb-1 text-on-surface-variant peer-checked:text-primary">description</span>
<span class="font-label-md text-label-md text-on-surface">Dokumen</span>
</div>
</label>
<label class="relative block cursor-pointer">
<input class="peer sr-only" name="category" type="radio" value="paket"/>
<div class="p-4 rounded-[12px] border-2 border-transparent bg-[#FAF7F2] text-center peer-checked:border-primary-container peer-checked:bg-primary-fixed/30 transition-all">
<span class="material-symbols-outlined block mb-1 text-on-surface-variant peer-checked:text-primary">package_2</span>
<span class="font-label-md text-label-md text-on-surface">Paket</span>
</div>
</label>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5">Berat Estimasi (kg)</label>
<div class="flex items-center gap-3">
<button class="w-12 h-12 flex items-center justify-center rounded-[12px] bg-secondary-container text-on-surface-variant active:scale-90 transition-transform" id="minusBtn" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="flex-1 bg-[#FAF7F2] border-none rounded-[12px] px-4 py-3 text-center text-title-lg font-number-md focus:ring-1.5 focus:ring-primary-container transition-all" id="weightInput" min="1" type="number" value="1"/>
<button class="w-12 h-12 flex items-center justify-center rounded-[12px] bg-secondary-container text-on-surface-variant active:scale-90 transition-transform" id="plusBtn" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<p class="mt-2 text-caption text-secondary italic">Minimum pengiriman adalah 1 kg.</p>
</div>
</div>
</section>
<!-- Terms & Conditions Micro-copy -->
<div class="flex items-start gap-3 px-2">
<input class="mt-1 rounded text-primary-container focus:ring-primary-container" id="terms" type="checkbox"/>
<label class="text-caption text-on-surface-variant" for="terms">Saya menyetujui <a class="text-primary underline" href="#">Syarat &amp; Ketentuan</a> pengiriman Expedisi.</label>
</div>
</form>
</main>
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 w-full bg-surface dark:bg-surface-dim p-5 border-t border-outline-variant/20 z-50">
<div class="max-w-[grid-mobile] mx-auto flex flex-col gap-2">
<div class="flex justify-between items-center mb-1">
<span class="text-label-md text-on-surface-variant">Estimasi Biaya</span>
<span class="text-headline text-primary font-bold">Rp 15.000</span>
</div>
<button class="w-full bg-primary-container text-white py-4 rounded-full font-headline text-headline text-center active:scale-[0.98] transition-all shadow-lg shadow-primary-container/20" form="shipmentForm" type="submit">
                Lanjut ke Pembayaran
            </button>
</div>
</div>
<!-- Bottom Navigation (Hidden for Task-Focused Page per Mandate) -->
<!-- The mandate states to suppress navigation if page intent is task-focused or transactional. -->
<script>
        // Simple Interaction logic for weight counter
        const weightInput = document.getElementById('weightInput');
        const minusBtn = document.getElementById('minusBtn');
        const plusBtn = document.getElementById('plusBtn');

        minusBtn.addEventListener('click', () => {
            let val = parseInt(weightInput.value);
            if (val > 1) weightInput.value = val - 1;
        });

        plusBtn.addEventListener('click', () => {
            let val = parseInt(weightInput.value);
            weightInput.value = val + 1;
        });

        // Micro-interaction for form submission
        document.getElementById('shipmentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            
            btn.innerHTML = `
                <div class="flex items-center justify-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Memproses...
                </div>
            `;
            btn.disabled = true;

            setTimeout(() => {
                alert('Mengarahkan ke gerbang pembayaran...');
                btn.innerText = originalText;
                btn.disabled = false;
            }, 1500);
        });
    </script>
</body></html>
