<!doctype html>

<html lang="id">
	<head>
		<meta charset="utf-8" />
		<meta content="width=device-width, initial-scale=1.0" name="viewport" />
		<title>Edit Profil - Booking Ekspedisi</title>
		<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
			rel="stylesheet" />
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
			rel="stylesheet" />
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
			rel="stylesheet" />
		<script id="tailwind-config">
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						colors: {
							"on-secondary-fixed-variant": "#474743",
							background: "#f8f9ff",
							"primary-fixed": "#ffdbca",
							primary: "#9d4300",
							"inverse-surface": "#27313f",
							"surface-container-lowest": "#ffffff",
							"surface-container-high": "#dee9fc",
							"primary-container": "#f97316",
							"on-primary-fixed-variant": "#783200",
							"on-primary-fixed": "#341100",
							"on-surface": "#121c2a",
							"surface-variant": "#d9e3f6",
							outline: "#8c7164",
							"surface-container": "#e6eeff",
							secondary: "#5f5e5b",
							"inverse-on-surface": "#eaf1ff",
							"surface-tint": "#9d4300",
							"inverse-primary": "#ffb690",
							"secondary-fixed-dim": "#c8c6c2",
							"on-error-container": "#93000a",
							tertiary: "#665d54",
							"on-background": "#121c2a",
							"on-primary-container": "#582200",
							"tertiary-fixed": "#eee0d5",
							"tertiary-fixed-dim": "#d1c4ba",
							"on-secondary-fixed": "#1c1c19",
							"on-tertiary-container": "#38312a",
							"on-secondary-container": "#656461",
							"primary-fixed-dim": "#ffb690",
							"tertiary-container": "#a4988f",
							surface: "#f8f9ff",
							"surface-bright": "#f8f9ff",
							"outline-variant": "#e0c0b1",
							"surface-container-low": "#eff4ff",
							"on-primary": "#ffffff",
							"on-tertiary-fixed-variant": "#4e453e",
							"secondary-container": "#e5e2dd",
							"surface-container-highest": "#d9e3f6",
							"on-tertiary-fixed": "#211a14",
							"error-container": "#ffdad6",
							"secondary-fixed": "#e5e2dd",
							"on-error": "#ffffff",
							"on-surface-variant": "#584237",
							"on-secondary": "#ffffff",
							"on-tertiary": "#ffffff",
							error: "#ba1a1a",
							"surface-dim": "#d0dbed",
						},
						borderRadius: {
							DEFAULT: "0.25rem",
							lg: "0.5rem",
							xl: "0.75rem",
							full: "9999px",
						},
						spacing: {
							"stack-gap": "16px",
							"inline-gap": "12px",
							"section-margin": "24px",
							"grid-mobile": "390px",
							"container-padding": "20px",
						},
						fontFamily: {
							display: ["Plus Jakarta Sans"],
							"body-md": ["Plus Jakarta Sans"],
							headline: ["Plus Jakarta Sans"],
							"label-md": ["Plus Jakarta Sans"],
							caption: ["Plus Jakarta Sans"],
							"title-lg": ["Plus Jakarta Sans"],
							"number-md": ["Plus Jakarta Sans"],
							"body-lg": ["Plus Jakarta Sans"],
						},
						fontSize: {
							display: [
								"24px",
								{
									lineHeight: "32px",
									letterSpacing: "-0.02em",
									fontWeight: "600",
								},
							],
							"body-md": ["15px", { lineHeight: "24px", fontWeight: "400" }],
							headline: [
								"20px",
								{
									lineHeight: "28px",
									letterSpacing: "-0.01em",
									fontWeight: "600",
								},
							],
							"label-md": ["14px", { lineHeight: "20px", fontWeight: "500" }],
							caption: ["12px", { lineHeight: "16px", fontWeight: "400" }],
							"title-lg": ["18px", { lineHeight: "24px", fontWeight: "600" }],
							"number-md": ["16px", { lineHeight: "24px", fontWeight: "500" }],
							"body-lg": ["16px", { lineHeight: "26px", fontWeight: "400" }],
						},
					},
				},
			};
		</script>
		<style>
			body {
				background-color: #faf7f2; /* Custom off-white from style guidance */
				color: #1f2937;
				-webkit-tap-highlight-color: transparent;
			}
			.filled-input:focus-within {
				border-color: #f97316 !important;
				border-width: 1.5px !important;
			}
			.soft-shadow {
				shadow: 0px 4px 12px rgba(31, 41, 55, 0.04);
			}
			.material-symbols-outlined {
				font-variation-settings:
					"FILL" 0,
					"wght" 400,
					"GRAD" 0,
					"opsz" 24;
			}
		</style>
	</head>
	<body class="font-body-md text-body-md min-h-screen pb-24">
		<!-- TopAppBar -->
		<header
			class="bg-surface sticky top-0 w-full z-50 flex items-center justify-between px-container-padding h-16 border-b border-outline-variant">
			<div class="flex items-center gap-4">
				<button
					class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:opacity-80"
					onclick="window.history.back()">
					<span
						class="material-symbols-outlined text-primary-container"
						data-icon="arrow_back"
						>arrow_back</span
					>
				</button>
				<h1 class="font-headline text-headline text-primary-container">
					Edit Profil
				</h1>
			</div>
		</header>
		<main class="max-w-[390px] mx-auto px-container-padding py-6 space-y-8">
			<!-- Avatar Section -->
			<section class="flex flex-col items-center justify-center space-y-4">
				<div class="relative group">
					<div
						class="w-28 h-28 rounded-full overflow-hidden border-4 border-white shadow-[0px_4px_12px_rgba(31,41,55,0.08)] bg-surface-container">
						<img
							class="w-full h-full object-cover"
							data-alt="A professional studio portrait of a friendly Indonesian man in his 30s with a clean haircut and a warm smile. The background is a soft, minimalist neutral grey. The lighting is high-key and flattering, matching a premium, clean logistics app aesthetic. The image is crisp, high-resolution, and modern."
							src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCfPMa3PqeYVYk4YbmOnLktk0zIJwgO8x37GV9fBk1t4yZP_FbGU7L-bEc12rtrOkio6PpobTEMhyXpeYfk4HYjIsTBGVT1pCXWCd1CNon3ch1QNjdrzy1nSyo4RcK1m0td_grkeRC4EyMT5FGeDfGpRtgAPT3ry6ul4MkB2uXm7-kKzjzsYk1Ifac2wsQjiS_B0FU5iwyL20BOjQDe1MtUtn9jfP9BcE_vhcD1F9GRwinWnJS7XQK" />
					</div>
					<div
						class="absolute bottom-0 right-0 bg-primary-container text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white">
						<span
							class="material-symbols-outlined text-[18px]"
							data-icon="photo_camera"
							>photo_camera</span
						>
					</div>
				</div>
				<button
					class="text-primary-container font-label-md text-label-md hover:underline active:opacity-70 transition-all">
					Ubah Foto
				</button>
			</section>
			<!-- Form Fields -->
			<section class="space-y-6">
				<!-- Nama Lengkap -->
				<div class="space-y-2">
					<label class="font-label-md text-label-md text-on-surface"
						>Nama Lengkap</label
					>
					<div
						class="filled-input bg-[#FAF7F2] rounded-xl px-4 h-[56px] flex items-center transition-all border border-transparent">
						<input
							class="bg-transparent w-full outline-none text-body-lg font-body-lg text-on-surface border-none focus:ring-0 p-0"
							placeholder="Masukkan nama lengkap"
							type="text"
							value="Budi Santoso" />
					</div>
				</div>
				<!-- Email -->
				<div class="space-y-2">
					<label class="font-label-md text-label-md text-on-surface"
						>Email</label
					>
					<div
						class="filled-input bg-[#FAF7F2] rounded-xl px-4 h-[56px] flex items-center transition-all border border-transparent">
						<input
							class="bg-transparent w-full outline-none text-body-lg font-body-lg text-on-surface border-none focus:ring-0 p-0"
							placeholder="Masukkan email"
							type="email"
							value="budi.santoso@email.com" />
					</div>
				</div>
				<!-- Nomor Telepon -->
				<div class="space-y-2">
					<label class="font-label-md text-label-md text-on-surface"
						>Nomor Telepon</label
					>
					<div
						class="filled-input bg-[#FAF7F2] rounded-xl px-4 h-[56px] flex items-center transition-all border border-transparent">
						<input
							class="bg-transparent w-full outline-none text-body-lg font-body-lg text-on-surface border-none focus:ring-0 p-0"
							placeholder="Masukkan nomor telepon"
							type="tel"
							value="+62 812-3456-7890" />
					</div>
				</div>
			</section>
			<!-- Security Section -->
			<section class="space-y-4">
				<h2 class="font-title-lg text-title-lg text-on-surface">Keamanan</h2>
				<div
					class="bg-white p-5 rounded-2xl shadow-[0px_4px_12px_rgba(31,41,55,0.04)] flex items-center justify-between group cursor-pointer active:scale-[0.98] transition-transform">
					<div class="flex items-center gap-3">
						<div
							class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary-container">
							<span class="material-symbols-outlined" data-icon="lock"
								>lock</span
							>
						</div>
						<div>
							<p class="font-label-md text-label-md text-on-surface">
								Ubah Kata Sandi
							</p>
							<p class="text-caption font-caption text-secondary">
								Terakhir diubah 3 bulan lalu
							</p>
						</div>
					</div>
					<span
						class="material-symbols-outlined text-secondary group-hover:text-primary-container transition-colors"
						data-icon="chevron_right"
						>chevron_right</span
					>
				</div>
			</section>
		</main>
		<!-- Sticky Bottom Button -->
		<div
			class="fixed bottom-0 left-0 right-0 bg-white p-container-padding pb-safe border-t border-outline-variant md:max-w-[390px] md:mx-auto">
			<button
				class="w-full bg-primary-container text-white py-4 rounded-full font-label-md text-label-md font-bold shadow-lg shadow-primary-container/20 active:scale-95 transition-transform duration-200">
				Simpan Perubahan
			</button>
		</div>
		<!-- Notification Micro-interaction (Hidden) -->
		<div
			class="fixed bottom-32 left-1/2 -translate-x-1/2 bg-on-surface text-background px-6 py-3 rounded-full font-label-md text-label-md shadow-xl opacity-0 transition-all duration-300 pointer-events-none"
			id="toast">
			Profil berhasil diperbarui
		</div>
		<script>
			// Simple Interaction logic
			const saveBtn = document.querySelector("button.bg-primary-container");
			const toast = document.getElementById("toast");

			saveBtn.addEventListener("click", () => {
				saveBtn.innerHTML =
					'<span class="flex items-center justify-center gap-2"><svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Menyimpan...</span>';

				setTimeout(() => {
					saveBtn.innerText = "Simpan Perubahan";
					toast.classList.remove("opacity-0");
					toast.classList.add("opacity-100");
					setTimeout(() => {
						toast.classList.remove("opacity-100");
						toast.classList.add("opacity-0");
					}, 2000);
				}, 1200);
			});

			// Hover/Focus effect for filled inputs
			const inputs = document.querySelectorAll(".filled-input");
			inputs.forEach((input) => {
				const field = input.querySelector("input");
				field.addEventListener("focus", () => {
					input.classList.add("bg-white");
					input.classList.remove("bg-[#FAF7F2]");
					input.style.boxShadow = "0px 4px 12px rgba(31, 41, 55, 0.04)";
				});
				field.addEventListener("blur", () => {
					input.classList.remove("bg-white");
					input.classList.add("bg-[#FAF7F2]");
					input.style.boxShadow = "none";
				});
			});
		</script>
	</body>
</html>
