<!doctype html>

<html class="light" lang="id">
	<head>
		<meta charset="utf-8" />
		<meta
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
			name="viewport" />
		<title>Buat Booking - Expedisi</title>
		<!-- Fonts & Icons -->
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
			rel="stylesheet" />
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
			rel="stylesheet" />
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100..900&display=swap"
			rel="stylesheet" />
		<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
		<style>
			.material-symbols-outlined {
				font-variation-settings:
					"FILL" 0,
					"wght" 400,
					"GRAD" 0,
					"opsz" 24;
				display: inline-block;
				line-height: 1;
				text-transform: none;
				letter-spacing: normal;
				word-wrap: normal;
				white-space: nowrap;
				direction: ltr;
			}

			body {
				-webkit-tap-highlight-color: transparent;
				overscroll-behavior-y: contain;
			}

			.no-scrollbar::-webkit-scrollbar {
				display: none;
			}

			.stepper-btn:active {
				transform: scale(0.9);
			}

			.collapsible-content {
				max-height: 0;
				overflow: hidden;
				transition:
					max-height 0.3s ease-out,
					opacity 0.3s ease-out;
				opacity: 0;
			}

			.collapsible-content.active {
				max-height: 500px;
				opacity: 1;
			}
		</style>
		<script id="tailwind-config">
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						colors: {
							"surface-container-highest": "#d9e3f6",
							"on-tertiary-fixed-variant": "#4e453e",
							"surface-container-lowest": "#ffffff",
							background: "#f8f9ff",
							"secondary-fixed": "#e5e2dd",
							"on-background": "#121c2a",
							"surface-dim": "#d0dbed",
							"on-tertiary": "#ffffff",
							"on-primary-fixed-variant": "#783200",
							"error-container": "#ffdad6",
							"tertiary-fixed": "#eee0d5",
							"on-secondary-container": "#656461",
							"on-tertiary-fixed": "#211a14",
							"secondary-container": "#e5e2dd",
							"inverse-surface": "#27313f",
							"inverse-primary": "#ffb690",
							surface: "#f8f9ff",
							"surface-container-high": "#dee9fc",
							primary: "#9d4300",
							"on-error-container": "#93000a",
							"surface-variant": "#d9e3f6",
							"tertiary-fixed-dim": "#d1c4ba",
							"inverse-on-surface": "#eaf1ff",
							"tertiary-container": "#a4988f",
							"surface-container-low": "#eff4ff",
							"on-secondary-fixed-variant": "#474743",
							"surface-tint": "#9d4300",
							"surface-container": "#e6eeff",
							"outline-variant": "#e0c0b1",
							tertiary: "#665d54",
							"on-error": "#ffffff",
							secondary: "#5f5e5b",
							"on-primary-fixed": "#341100",
							"on-surface": "#121c2a",
							"primary-container": "#f97316",
							"primary-fixed": "#ffdbca",
							outline: "#8c7164",
							"secondary-fixed-dim": "#c8c6c2",
							error: "#ba1a1a",
							"on-primary-container": "#582200",
							"surface-bright": "#f8f9ff",
							"on-tertiary-container": "#38312a",
							"on-secondary": "#ffffff",
							"on-secondary-fixed": "#1c1c19",
							"on-surface-variant": "#584237",
							"on-primary": "#ffffff",
							"primary-fixed-dim": "#ffb690",
						},
						borderRadius: {
							DEFAULT: "0.25rem",
							lg: "0.5rem",
							xl: "0.75rem",
							full: "9999px",
						},
						spacing: {
							"container-padding": "20px",
							"stack-gap": "16px",
							"inline-gap": "12px",
							"grid-mobile": "390px",
							"section-margin": "24px",
						},
						fontFamily: {
							"label-md": ["Plus Jakarta Sans"],
							"body-md": ["Plus Jakarta Sans"],
							caption: ["Plus Jakarta Sans"],
							"body-lg": ["Plus Jakarta Sans"],
							"title-lg": ["Plus Jakarta Sans"],
							display: ["Plus Jakarta Sans"],
							"number-md": ["Plus Jakarta Sans"],
							headline: ["Plus Jakarta Sans"],
						},
						fontSize: {
							"label-md": ["14px", { lineHeight: "20px", fontWeight: "500" }],
							"body-md": ["15px", { lineHeight: "24px", fontWeight: "400" }],
							caption: ["12px", { lineHeight: "16px", fontWeight: "400" }],
							"body-lg": ["16px", { lineHeight: "26px", fontWeight: "400" }],
							"title-lg": ["18px", { lineHeight: "24px", fontWeight: "600" }],
							display: [
								"24px",
								{
									lineHeight: "32px",
									letterSpacing: "-0.02em",
									fontWeight: "600",
								},
							],
							"number-md": ["16px", { lineHeight: "24px", fontWeight: "500" }],
							headline: [
								"20px",
								{
									lineHeight: "28px",
									letterSpacing: "-0.01em",
									fontWeight: "600",
								},
							],
						},
					},
				},
			};
		</script>
	</head>
	<body class="bg-[#FAF7F2] font-body-md text-on-surface pb-32">
		<!-- Top AppBar -->
		<header
			class="fixed top-0 w-full z-50 bg-surface dark:bg-surface-dim border-b border-outline-variant/30 flex justify-between items-center px-container-padding h-16">
			<div class="flex items-center gap-3">
				<button class="active:scale-95 transition-transform">
					<span class="material-symbols-outlined text-primary">arrow_back</span>
				</button>
				<h1 class="font-headline text-headline text-primary">Buat Booking</h1>
			</div>
			<button class="active:scale-95 transition-transform">
				<span class="material-symbols-outlined text-on-surface-variant"
					>help_outline</span
				>
			</button>
		</header>
		<main class="pt-20 px-container-padding space-y-6">
			<!-- Sender Read-only Card -->
			<section>
				<div
					class="bg-white rounded-xl p-4 shadow-[0px_4px_12px_rgba(31,41,55,0.04)] flex items-center justify-between">
					<div class="flex items-start gap-3">
						<span
							class="material-symbols-outlined text-primary-container mt-0.5"
							data-weight="fill"
							>location_on</span
						>
						<div>
							<p class="font-caption text-caption text-secondary">
								Dikirim dari:
							</p>
							<p class="font-label-md text-label-md text-on-surface">
								Toko Maju Jaya, Jakarta
							</p>
						</div>
					</div>
					<a
						class="font-label-md text-label-md text-primary-container font-semibold hover:opacity-80 transition-opacity"
						href="#"
						>Edit</a
					>
				</div>
			</section>
			<!-- Section 1: Jenis Layanan -->
			<section class="space-y-3">
				<h2 class="font-title-lg text-title-lg text-on-surface">
					Jenis Layanan
				</h2>
				<div class="flex flex-wrap gap-2">
					<button
						class="px-5 py-2 rounded-full bg-primary-container text-white font-label-md text-label-md transition-all active:scale-95">
						Reguler
					</button>
					<button
						class="px-5 py-2 rounded-full bg-secondary-container text-on-secondary-container font-label-md text-label-md transition-all active:scale-95">
						Express
					</button>
					<button
						class="px-5 py-2 rounded-full bg-secondary-container text-on-secondary-container font-label-md text-label-md transition-all active:scale-95">
						Kargo
					</button>
				</div>
			</section>
			<!-- Section 2: Penerima -->
			<section class="space-y-4">
				<h2 class="font-title-lg text-title-lg text-on-surface">Penerima</h2>
				<div
					class="space-y-4 bg-white p-5 rounded-2xl shadow-[0px_4px_12px_rgba(31,41,55,0.04)]">
					<div class="space-y-1.5">
						<label class="font-label-md text-label-md text-on-surface px-1"
							>Nama Penerima</label
						>
						<input
							class="w-full bg-[#FAF7F2] border-none rounded-xl px-4 py-3 focus:ring-1.5 focus:ring-primary-container font-body-md text-on-surface outline-none transition-all"
							placeholder="Contoh: Budi Santoso"
							type="text" />
					</div>
					<div class="space-y-1.5">
						<label class="font-label-md text-label-md text-on-surface px-1"
							>No. Telepon</label
						>
						<input
							class="w-full bg-[#FAF7F2] border-none rounded-xl px-4 py-3 focus:ring-1.5 focus:ring-primary-container font-body-md text-on-surface outline-none transition-all"
							placeholder="0812xxxx"
							type="tel" />
					</div>
					<div class="space-y-1.5">
						<label class="font-label-md text-label-md text-on-surface px-1"
							>Alamat Lengkap</label
						>
						<textarea
							class="w-full bg-[#FAF7F2] border-none rounded-xl px-4 py-3 focus:ring-1.5 focus:ring-primary-container font-body-md text-on-surface outline-none transition-all resize-none"
							placeholder="Jl. Anggrek No. 12, RT 01/RW 02..."
							rows="3"></textarea>
					</div>
					<div class="space-y-1.5">
						<label class="font-label-md text-label-md text-on-surface px-1"
							>Kota Tujuan</label
						>
						<div class="relative">
							<input
								class="w-full bg-[#FAF7F2] border-none rounded-xl px-4 py-3 pr-10 focus:ring-1.5 focus:ring-primary-container font-body-md text-on-surface outline-none transition-all"
								placeholder="Cari Kota/Kecamatan"
								type="text" />
							<span
								class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-secondary"
								>search</span
							>
						</div>
					</div>
				</div>
			</section>
			<!-- Section 3: Detail Barang -->
			<section class="space-y-4">
				<h2 class="font-title-lg text-title-lg text-on-surface">
					Detail Barang
				</h2>
				<div
					class="bg-white p-5 rounded-2xl shadow-[0px_4px_12px_rgba(31,41,55,0.04)] space-y-5">
					<div class="space-y-1.5">
						<label class="font-label-md text-label-md text-on-surface px-1"
							>Isi Barang</label
						>
						<input
							class="w-full bg-[#FAF7F2] border-none rounded-xl px-4 py-3 focus:ring-1.5 focus:ring-primary-container font-body-md text-on-surface outline-none transition-all"
							placeholder="Contoh: Pakaian, Elektronik"
							type="text" />
					</div>
					<div class="flex items-center justify-between">
						<div class="space-y-1">
							<label class="font-label-md text-label-md text-on-surface px-1"
								>Berat (kg)</label
							>
							<p class="font-caption text-caption text-secondary px-1">
								Min. 1kg
							</p>
						</div>
						<div class="flex items-center gap-4 bg-[#FAF7F2] p-1 rounded-xl">
							<button
								class="stepper-btn w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm text-primary-container transition-transform"
								onclick="changeWeight(-1)">
								<span class="material-symbols-outlined">remove</span>
							</button>
							<span
								class="font-number-md text-number-md w-8 text-center"
								id="weight-display"
								>1</span
							>
							<button
								class="stepper-btn w-10 h-10 flex items-center justify-center bg-primary-container rounded-lg shadow-sm text-white transition-transform"
								onclick="changeWeight(1)">
								<span class="material-symbols-outlined">add</span>
							</button>
						</div>
					</div>
					<!-- Collapsible Dimension -->
					<div class="pt-2">
						<button
							class="flex items-center justify-between w-full font-label-md text-label-md text-primary-container py-2 group"
							onclick="toggleDimensions()">
							<span class="flex items-center gap-2">
								<span class="material-symbols-outlined text-[20px]"
									>straighten</span
								>
								Dimensi (opsional)
							</span>
							<span
								class="material-symbols-outlined transition-transform duration-300"
								id="dimension-arrow"
								>expand_more</span
							>
						</button>
						<div
							class="collapsible-content space-y-4 mt-2"
							id="dimension-content">
							<div class="grid grid-cols-3 gap-3">
								<div class="space-y-1">
									<label class="font-caption text-caption text-secondary"
										>P (cm)</label
									>
									<input
										class="w-full bg-[#FAF7F2] border-none rounded-xl px-3 py-3 focus:ring-1.5 focus:ring-primary-container font-body-md text-on-surface outline-none transition-all text-center"
										placeholder="0"
										type="number" />
								</div>
								<div class="space-y-1">
									<label class="font-caption text-caption text-secondary"
										>L (cm)</label
									>
									<input
										class="w-full bg-[#FAF7F2] border-none rounded-xl px-3 py-3 focus:ring-1.5 focus:ring-primary-container font-body-md text-on-surface outline-none transition-all text-center"
										placeholder="0"
										type="number" />
								</div>
								<div class="space-y-1">
									<label class="font-caption text-caption text-secondary"
										>T (cm)</label
									>
									<input
										class="w-full bg-[#FAF7F2] border-none rounded-xl px-3 py-3 focus:ring-1.5 focus:ring-primary-container font-body-md text-on-surface outline-none transition-all text-center"
										placeholder="0"
										type="number" />
								</div>
							</div>
						</div>
					</div>
					<div class="space-y-1.5">
						<label class="font-label-md text-label-md text-on-surface px-1"
							>Nilai Barang (Rp)</label
						>
						<div class="relative">
							<span
								class="absolute left-4 top-1/2 -translate-y-1/2 font-label-md text-secondary"
								>Rp</span
							>
							<input
								class="w-full bg-[#FAF7F2] border-none rounded-xl pl-12 pr-4 py-3 focus:ring-1.5 focus:ring-primary-container font-body-md text-on-surface outline-none transition-all"
								placeholder="0"
								type="number" />
						</div>
					</div>
				</div>
			</section>
			<!-- Summary Card -->
			<section>
				<div
					class="bg-primary-container/10 border border-primary-container/20 rounded-2xl p-5 flex flex-col gap-1">
					<div class="flex justify-between items-center">
						<p class="font-label-md text-label-md text-on-surface-variant">
							Estimasi Ongkir
						</p>
						<p class="font-title-lg text-title-lg text-primary-container">
							Rp 300.000
						</p>
					</div>
					<p class="font-caption text-caption text-secondary italic">
						Estimasi — harga final dikonfirmasi admin
					</p>
				</div>
			</section>
		</main>
		<!-- Sticky Bottom Bar -->
		<div
			class="fixed bottom-0 w-full bg-white px-container-padding py-4 shadow-[0px_-4px_12px_rgba(31,41,55,0.06)] z-50">
			<button
				class="w-full bg-primary-container text-white font-headline text-headline h-14 rounded-full active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2">
				Kirim Booking
				<span class="material-symbols-outlined">send</span>
			</button>
		</div>
		<!-- Micro-interactions Script -->
		<script>
			let weight = 1;
			const weightDisplay = document.getElementById("weight-display");

			function changeWeight(delta) {
				weight = Math.max(1, weight + delta);
				weightDisplay.textContent = weight;
			}

			function toggleDimensions() {
				const content = document.getElementById("dimension-content");
				const arrow = document.getElementById("dimension-arrow");

				content.classList.toggle("active");

				if (content.classList.contains("active")) {
					arrow.style.transform = "rotate(180deg)";
				} else {
					arrow.style.transform = "rotate(0deg)";
				}
			}

			// Active Ripple or Scale effect simulated by Tailwind's active:scale-95
			// but adding simple touch handling for cleaner mobile feel
			document.querySelectorAll("button").forEach((btn) => {
				btn.addEventListener("touchstart", () => {}, { passive: true });
			});
		</script>
	</body>
</html>
