<style>
        body {

        }
        .pill-button {

        }
        .pill-button:active {

<body class="flex flex-col items-center justify-start min-h-screen">
<!-- Top App Bar -->
<header class="w-full top-0 sticky z-50 bg-white shadow-sm">
<div class="flex items-center justify-between px-container-padding h-16 w-full max-w-grid-mobile mx-auto">
<button class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<div class="font-headline text-headline font-bold text-primary">Ekspedisi</div>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-grid-mobile flex flex-col px-container-padding pt-8 pb-12 bg-white flex-grow shadow-sm">
<!-- Welcome Header -->
<div class="mb-section-margin">
<h1 class="font-display text-display text-on-surface mb-2">Daftar Akun Baru</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Mulai kelola pengiriman logistik Anda dengan lebih efisien dan aman.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-stack-gap">
<!-- Full Name -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="name">Nama Lengkap</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl input-filled border-none text-on-surface placeholder:text-outline-variant font-body-md" id="name" placeholder="Masukkan nama lengkap Anda" type="text"/>
</div>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="phone">Nomor Telepon</label>
<div class="relative flex">
<div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center gap-2 border-r border-outline-variant pr-3">
<span class="font-label-md text-on-surface-variant">+62</span>
</div>
<input class="w-full h-12 pl-16 pr-4 rounded-xl input-filled border-none text-on-surface placeholder:text-outline-variant font-body-md" id="phone" placeholder="812 3456 7890" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="password">Kata Sandi</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl input-filled border-none text-on-surface placeholder:text-outline-variant font-body-md" id="password" placeholder="Minimal 8 karakter" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="confirm-password">Konfirmasi Kata Sandi</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl input-filled border-none text-on-surface placeholder:text-outline-variant font-body-md" id="confirm-password" placeholder="Ulangi kata sandi" type="password"/>
</div>
</div>
<!-- Terms & Conditions Checkbox -->
<div class="flex items-start gap-3 mt-2">
<div class="pt-1">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 bg-surface" id="terms" type="checkbox"/>
</div>
<label class="font-caption text-caption text-on-surface-variant leading-tight" for="terms">
                    Saya setuju dengan <span class="text-primary font-medium hover:underline">Syarat &amp; Ketentuan</span> serta <span class="text-primary font-medium hover:underline">Kebijakan Privasi</span> yang berlaku.
                </label>
</div>
<!-- Primary Action Button -->
<div class="mt-4">
<button class="w-full h-14 bg-primary-container text-white font-label-md rounded-full shadow-lg shadow-primary-container/20 active:scale-[0.97] transition-all hover:bg-primary" type="submit">
                    Daftar
                </button>
</div>
</form>
<!-- Social Register Divider -->
<div class="flex items-center gap-4 my-8">
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
<span class="font-caption text-caption text-outline-variant">Atau daftar dengan</span>
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
</div>

<span class="font-label-md text-on-surface">Google</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 h-12 border border-outline-variant rounded-xl hover:bg-surface transition-colors">
<span class="material-symbols-outlined text-[#1877F2]">face_nod</span>
<span class="font-label-md text-on-surface">Facebook</span>
</button>
</div>
<!-- Footer Footer -->
<div class="mt-auto pt-10 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Sudah punya akun? <a class="text-primary font-semibold hover:underline" href="#">Masuk</a>
</p>
</div>
</main>
<!-- Illustrative Detail (Optional but adds premium feel) -->
<div class="fixed bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-primary-container via-primary to-primary-container opacity-20 pointer-events-none"></div>
<script>
        // Simple micro-interaction for password visibility
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const icon = btn.querySelector('.material-symbols-outlined');
                if (icon && (icon.innerText === 'visibility_off' || icon.innerText === 'visibility')) {
                    const input = btn.previousElementSibling;
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.innerText = 'visibility';
                    } else {
                        input.type = 'password';
                        icon.innerText = 'visibility_off';
                    }
                }
            });
        });

        // Form submission prevent default for demo
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Trigger haptic feedback or transition
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                btn.innerHTML = 'Berhasil Terdaftar';
                btn.classList.replace('bg-primary-container', 'bg-green-600');
            }, 1500);
        });
    </script>
</body></html>
